<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radiology</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div class="container">
    <!-- Different columns for the modalities and on click opens a modal with the reservation details -->
    <h1 class="text-center mt-5">Modality List</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">Modality Name</th>
            <th scope="col">Description</th>
            <th scope="col">Location</th>
        </tr>
        </thead>
        <tbody id="modalityList">

        </tbody>
    </table>


    <a href="/index.html" class="btn btn-primary">To Homepage</a>
</div>


<div class="modal fade" id="reservationModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Reservations</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th scope="col">Patient Name</th>
                        <th scope="col">Patient Social number</th>
                        <th scope="col">Body Region</th>
                        <th scope="col">Comment</th>
                        <th scope="col">Reservation Date</th>
                    </tr>
                    </thead>
                    <tbody id="reservations">



                    </tbody>

                </table>
                <div id="status">

                </div>
            </div>

        </div>

    </div>

</div>



</body>
<script SRC="JS/listReservations.js"></script>
</html>
